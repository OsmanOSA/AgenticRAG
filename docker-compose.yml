networks:
  agenticrag_network:
    driver: bridge

volumes:
  hf_cache:
  logs:
  postgres_data:

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - agenticrag_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: agenticrag_postgres
    environment:
      POSTGRES_DB: agenticrag
      POSTGRES_USER: agenticrag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenticrag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agenticrag_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticrag -d agenticrag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agenticrag_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+psycopg2://agenticrag:${POSTGRES_PASSWORD:-agenticrag}@postgres:5432/agenticrag
    volumes:
      - ./datasets:/app/datasets
      - logs:/app/logs
      - hf_cache:/root/.cache/huggingface
    networks:
      - agenticrag_network
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agenticrag_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    networks:
      - agenticrag_network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
